name: Visual Regression

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/visual/**'
      - 'vitest.config.visual.ts'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/visual/**'
      - 'vitest.config.visual.ts'

permissions:
  contents: read

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  visual-test:
    name: Visual regression test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # On main: generate and cache reference screenshots
      - name: Restore reference screenshots (main)
        if: github.event_name == 'push'
        id: screenshots-cache-main
        uses: actions/cache@v5
        with:
          path: test/visual/__screenshots__
          key: visual-screenshots-main-${{ github.sha }}
          restore-keys: |
            visual-screenshots-main-

      - name: Generate reference screenshots (main)
        if: github.event_name == 'push' && steps.screenshots-cache-main.outputs.cache-hit != 'true'
        run: pnpm test:visual:update

      # On PRs: restore main baseline and compare
      - name: Restore reference screenshots from main (PR)
        if: github.event_name == 'pull_request'
        id: screenshots-cache-pr
        uses: actions/cache/restore@v5
        with:
          path: test/visual/__screenshots__
          key: visual-screenshots-main-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            visual-screenshots-main-

      - name: Check for existing screenshots (PR)
        if: github.event_name == 'pull_request'
        id: check-screenshots
        run: |
          if [ -d "test/visual/__screenshots__" ] && [ -n "$(ls -A test/visual/__screenshots__ 2>/dev/null)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate baseline if none cached (PR)
        if: github.event_name == 'pull_request' && steps.check-screenshots.outputs.exists != 'true'
        run: |
          echo "::warning::No reference screenshots from main found. Generating baseline for this run."
          pnpm test:visual:update

      - name: Generate screenshots for new icons (PR)
        if: github.event_name == 'pull_request' && steps.check-screenshots.outputs.exists == 'true'
        run: |
          # Build to make the dist available for the node script
          pnpm build --silent
          # Find icons that don't have a reference screenshot yet (newly added in this PR)
          NEW_ICONS=$(node --input-type=module <<'EOF'
          import { existsSync } from 'node:fs';
          import * as icons from './dist/index.mjs';
          const fwdRef = Symbol.for('react.forward_ref');
          const dir = 'test/visual/__screenshots__/icons.test.tsx';
          const newIcons = Object.entries(icons)
            .filter(([, v]) => v?.$$typeof === fwdRef)
            .map(([name]) => name)
            .filter(name => !existsSync(`${dir}/${name}.png`));
          if (newIcons.length > 0) {
            process.stdout.write(newIcons.join('|'));
          }
          EOF
          )
          if [ -n "$NEW_ICONS" ]; then
            echo "::notice::Generating reference screenshots for new icons: $NEW_ICONS"
            pnpm test:visual:update -t "$NEW_ICONS"
          fi

      - name: Run visual regression tests
        if: github.event_name == 'pull_request'
        run: pnpm test:visual

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: test/visual/__screenshots__
          retention-days: 30
